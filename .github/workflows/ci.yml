name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r services/api/requirements.txt
      - run: PYTHONPATH=services/api pytest -q services/api/app/tests
        env:
          DEMO_MODE: "true"

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web

  smoke:
    runs-on: ubuntu-latest
    needs: [api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r services/api/requirements.txt
      - name: Start API in background
        run: |
          PYTHONPATH=services/api nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
        env:
          DEMO_MODE: "true"
      - name: Run smoke tests
        run: bash scripts/smoke.sh http://localhost:8000
